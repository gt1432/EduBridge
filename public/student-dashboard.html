<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBridge - Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">EduBridge</div>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a class="nav-link active" data-target="resources-section">📚 Study Materials</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-target="doubts-section">❓ Ask Doubts</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" data-target="chat-section">💬 Chat</a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn btn-secondary">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header-bar">
                <h2>Student Dashboard</h2>
                <div class="user-info">Welcome, <span id="userName">Student</span></div>
            </div>

            <!-- Resources Section -->
            <section id="resources-section" class="section-view active">
                <h3>Available Resources</h3>
                <div class="card-grid" id="resourcesList">
                    <!-- Resources injected here -->
                </div>
            </section>

            <!-- Doubts Section -->
            <section id="doubts-section" class="section-view">
                <h3>Doubts Forum</h3>
                <div style="margin-bottom: 2rem; background:var(--card-bg); padding:1.5rem; border-radius:8px; border:1px solid var(--border-color);">
                    <h4>Ask a new question</h4>
                    <form id="doubtForm">
                        <textarea id="doubtQuestion" class="form-control" rows="3" placeholder="What's your doubt?" required style="margin-bottom: 1rem;"></textarea>
                        <button type="submit" class="btn btn-primary" style="width: auto;">Post Question</button>
                    </form>
                </div>
                
                <div id="doubtsList">
                    <!-- Doubts injected here -->
                </div>
            </section>

            <!-- Chat Section -->
            <section id="chat-section" class="section-view">
                <h3>Direct Messaging</h3>
                <div style="display:flex; gap:1rem;">
                    <div style="width:250px; background:white; border-radius:8px; border:1px solid var(--border-color); padding:1rem;" id="userList">
                        <h4>Mentors</h4>
                        <!-- User list injected here -->
                    </div>
                    <div class="chat-container" style="flex-grow:1;">
                        <div class="chat-history" id="chatHistory">
                            <p style="text-align:center; color:var(--text-muted); margin-top:2rem;">Select a mentor to chat</p>
                        </div>
                        <div class="chat-input-area" id="chatInputArea" style="display:none;">
                            <input type="text" id="chatMessage" class="form-control" placeholder="Type a message...">
                            <button id="sendMsgBtn" class="btn btn-primary" style="width:auto;">Send</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/student.js"></script>
</body>
</html>
